steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/openbrowser-worker'
      - '-f'
      - 'packages/worker/Dockerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/openbrowser-worker'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'openbrowser-worker'
      - '--image'
      - 'gcr.io/$PROJECT_ID/openbrowser-worker'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '900'
      - '--concurrency'
      - '1'
      - '--max-instances'
      - '5'
      - '--no-allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/openbrowser-worker'
